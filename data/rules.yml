version: "3.1"

rules:

- rule: greet
  steps:
    - intent: greet
    - action: utter_greet

- rule: goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: activate leave form
  steps:
    - intent: check_leave_balance
    - action: leave_form
    - active_loop: leave_form

- rule: submit leave form
  condition:
    - active_loop: leave_form
  steps:
    - action: leave_form
    - active_loop: null
    - action: action_submit_leave_form

- rule: payroll
  steps:
    - intent: payroll_query
    - action: action_payroll

- rule: benefits
  steps:
    - intent: benefits_query
    - action: action_benefits

- rule: fallback
  steps:
    - intent: nlu_fallback
    - action: utter_fallback